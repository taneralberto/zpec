# Ejemplo de Domain
# Este archivo estaría en .project-spec/domains/DOMAIN-core.yaml

schema: domain/v1
id: DOMAIN-core
name: "Core"
bounded_context: core

description: |
  Funcionalidad central del sistema: CLI, validación,
  indexado, queries básicas.

entities:
  - cli
  - config
  - schema
  - index

relations:
  - domain: ai
    via: [config]
  - domain: graph
    via: [index]

active_crs: [CR-001]
archived_crs: []

owner: "@tano"
