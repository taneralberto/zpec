# Ejemplo de Architecture Decision Record
# Este archivo estaría en .project-spec/decisions/ADR-001.yaml

schema: adr/v1
id: ADR-001
status: active

decided_at: 2025-05-03
authors: [tano]

context: |
  Necesitamos decidir cómo almacenar y consultar la información
  de cambios arquitectónicos. Las opciones son:
  1. Solo archivos YAML (sin índice)
  2. Base de datos SQLite como índice
  3. Base de datos externa (PostgreSQL, etc.)

decision: |
  Usaremos SQLite como índice local derivado de los archivos YAML.

  Razones:
  - Queries eficientes sin servidor
  - Cada dev tiene su copia local
  - Los YAMLs siguen siendo el source of truth
  - Se regenera automáticamente con hooks

alternatives:
  - name: "Solo archivos YAML"
    rejected_because: "Queries O(n), no escala con muchos CRs"
  - name: "PostgreSQL externo"
    rejected_because: "Requiere infraestructura, complejidad innecesaria"

consequences:
  positive:
    - "Sin dependencias de servidor"
    - "Queries rápidas"
    - "Git-friendly (YAMLs)"
  negative:
    - "Hay que rebuild el índice al hacer pull"
    - "Dos representaciones para mantener"

relationships:
  affects_crs: []
  related_adrs: []

tags: [architecture, storage, sqlite]
