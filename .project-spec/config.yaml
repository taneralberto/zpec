# .project-spec/config.yaml
# Configuración del proyecto

schema: config/v1

project:
  name: ztructure
  version: 0.1.0

stack:
  backend: typescript
  runtime: node

graph:
  max_domain_crs: 50
  archive_after_months: 12
  relevance_window: 6

relevance:
  max_comparisons: 20
  domain_weight: 10
  entity_weight: 5
  recency_bonus_6m: 5
  recency_bonus_12m: 2
  min_score: 5

ai:
  provider: openrouter
  model: anthropic/claude-3-sonnet
  api_key_env: OPENROUTER_API_KEY

lint:
  enabled_rules:
    - require_domain
    - require_affects
    - check_conflicts
    - check_dependencies
  fail_on_warning: false

hooks:
  post_merge: spec rebuild-index
  pre_commit: spec validate
